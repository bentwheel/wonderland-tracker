# Wonderland tracker — nginx snippet.
#
# Reverse-proxies the API paths to the Node service (127.0.0.1:8787) so the
# frontend can use same-origin relative URLs (/api/..., /admin/upload, /photos/...)
# and avoid CORS entirely.
#
# >>> IMPORTANT (Cameron): this assumes cslester.com is served by THIS nginx on
# >>> wavebeam. If cslester.com is hosted elsewhere (Netlify, GitHub Pages, a
# >>> separate box), this proxy approach won't work — instead set
# >>> CONFIG.API_BASE in tracker.js (and API_BASE in admin/index.html) to the
# >>> API's public URL and rely on CORS. See OPEN QUESTIONS in DEPLOY.md.
# >>> Also: please share your existing cslester.com server block so the static
# >>> /wonderland-2026/ location and these proxy blocks can be merged cleanly.
#
# Drop the three location blocks below inside the existing `server { }` block
# for cslester.com, then:   nginx -t && systemctl reload nginx

location /api/ {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# The upload endpoint needs a larger body limit for phone photos.
location /admin/upload {
    client_max_body_size 30m;
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /photos/ {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
}

# NOTE: the static admin *page* lives at /wonderland-2026/admin/ (served as a
# static file by the cslester.com pipeline) and is unrelated to /admin/upload
# above (the API endpoint). They share the "/admin" prefix but are different
# things — the location above only matches the exact upload path.
