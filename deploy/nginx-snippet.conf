# Wonderland tracker — nginx snippet (REFERENCE).
#
# On wavebeam this is ALREADY configured: cslester.com's server block already
# proxies /api/, /admin/upload, and /photos/ to the Node API on 127.0.0.1:8788.
# This file is kept only as documentation of what those blocks look like; you do
# not need to re-apply it on the existing host.
#
# Note the API port is 8788 (8787 is taken by RStudio Server on this box).
#
# To apply on a fresh host: drop the three location blocks below inside the
# cslester.com `server { }` block, then:  nginx -t && systemctl reload nginx

location /api/ {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# The upload endpoint needs a larger body limit for phone photos.
location /admin/upload {
    client_max_body_size 30m;
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /photos/ {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
}

# NOTE: the static admin *page* lives at /wonderland-2026/admin/ (served as a
# static file by the cslester.com pipeline) and is unrelated to /admin/upload
# above (the API endpoint). They share the "/admin" prefix but are different
# things — the location above only matches the exact upload path.
